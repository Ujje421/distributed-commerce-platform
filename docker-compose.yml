version: '3.8'

# This file extends docker-compose.infra.yml to include the application services.
# Used for full local testing.

services:
  # ==========================================
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: ecommerce_api_gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    depends_on:
      - identity-service
      - user-service
      - product-catalog-service
      - order-service
    networks:
      - default

  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    container_name: ecommerce_identity
    ports:
      - "3001:3001"
      - "50051:50051"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://ecommerce:ecommerce_secret_2024@postgres:5432/identity_db?schema=public
      - KAFKA_BROKERS=kafka:29092
    networks:
      - default

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: ecommerce_user
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DATABASE_URL=postgresql://ecommerce:ecommerce_secret_2024@postgres:5432/user_db?schema=public
      - KAFKA_BROKERS=kafka:29092
    networks:
      - default

  product-catalog-service:
    build:
      context: .
      dockerfile: services/product-catalog-service/Dockerfile
    container_name: ecommerce_product
    ports:
      - "3003:3003"
      - "50055:50055"
    environment:
      - NODE_ENV=development
      - PORT=3003
      - DATABASE_URL=postgresql://ecommerce:ecommerce_secret_2024@postgres:5432/product_db?schema=public
      - KAFKA_BROKERS=kafka:29092
      - OPENSEARCH_NODE=http://opensearch:9200
    networks:
      - default

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    container_name: ecommerce_inventory
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - DATABASE_URL=postgresql://ecommerce:ecommerce_secret_2024@postgres:5432/inventory_db?schema=public
      - KAFKA_BROKERS=kafka:29092
    networks:
      - default

  cart-service:
    build:
      context: .
      dockerfile: services/cart-service/Dockerfile
    container_name: ecommerce_cart
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=development
      - PORT=3005
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
    networks:
      - default

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: ecommerce_order
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=development
      - PORT=3006
      - DATABASE_URL=postgresql://ecommerce:ecommerce_secret_2024@postgres:5432/order_db?schema=public
      - KAFKA_BROKERS=kafka:29092
    networks:
      - default

  recommendation-service:
    build:
      context: .
      dockerfile: services/recommendation-service/Dockerfile
    container_name: ecommerce_recommendation
    ports:
      - "3011:3011"
    environment:
      - KAFKA_BROKERS=kafka:29092
    networks:
      - default

networks:
  default:
    name: ecommerce_network
